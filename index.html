      {
        "@context": "https://schema.org",

        "mainEntity": [
          {
            "@type": "Question",
            "name": "Что такое n8n и зачем нужна автоматизация?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "n8n — это платформа для соединения сервисов в единые сценарии без рутинного ручного труда. Заявки, уведомления, выгрузки данных и обработка AI запускаются автоматически. В итоге команда тратит время на задачи, а не на однотипные операции."
            }
          },
          {
            "@type": "Question",
            "name": "Сколько стоит проект и от чего зависит цена?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Стоимость зависит от объёма: количества сценариев, интеграций и сложности AI-логики. После короткого брифинга мы фиксируем объём и называем точную цену — без скрытых платежей. Небольшие задачи можно сделать пакетно."
            }
          },
          {
            "@type": "Question",
            "name": "Сколько времени занимает разработка?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Простой бот или сценарий — от нескольких дней. Комплексная интеграция с CRM и AI-ассистентом — от 1–2 недель. Точные сроки фиксируем на этапе проектирования и часто сдаём раньше срока."
            }
          },
          {
            "@type": "Question",
            "name": "С какими CRM и сервисами вы интегрируетесь?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Практически с любыми, у которых есть API или вебхуки: amoCRM, Bitrix24, Google-сервисы, Telegram, базы данных (PostgreSQL и др.), платёжные системы и сотни других через n8n, Make и Zapier."
            }
          },
          {
            "@type": "Question",
            "name": "Безопасны ли мои данные при внедрении AI?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Да. Доступы храним по принципу минимальных прав, ключи — в защищённых хранилищах. По запросу разворачиваем решение на вашей инфраструктуре, чтобы данные не покидали ваш контур."
            }
          },
          {
            "@type": "Question",
            "name": "Можно ли доработать существующую систему, а не делать с нуля?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Конечно. Часто мы подключаемся к уже работающим сайтам, CRM и ботам: добавляем AI, оптимизируем сценарии и закрываем узкие места, не переписывая всё заново."
            }
          },
          {
            "@type": "Question",
            "name": "Будет ли поддержка после запуска?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Да. После сдачи передаём код и документацию, обучаем команду и сопровождаем решение: дорабатываем, масштабируем и помогаем по мере роста."

            }
          }
